apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/eltcarlos/Production-Grade_GitOps-Driven_Microservices-Demo.git
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc. # This is the in-cluster API server URL.
    namespace: boutique-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
